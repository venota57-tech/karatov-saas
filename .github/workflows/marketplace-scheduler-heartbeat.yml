name: KARATOV Scheduler Heartbeat

on:
  workflow_dispatch:
  schedule:
    - cron: "9-59/10 * * * *"

permissions:
  contents: read

concurrency:
  group: karatov-scheduler-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WB_API_KEY: ${{ secrets.WB_API_KEY }}
      WB_API_TOKEN: ${{ secrets.WB_API_TOKEN }}
      OZON_CLIENT_ID: ${{ secrets.OZON_CLIENT_ID }}
      OZON_API_KEY: ${{ secrets.OZON_API_KEY }}
      RECOVERY_V5_STAGE: scheduler_heartbeat
      RECOVERY_V5_PLATFORM: ALL
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Write scheduler heartbeat
        working-directory: backend
        run: python -m app.recovery_v5_stage_entry
