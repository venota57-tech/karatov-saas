name: KARATOV Operations Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '12,42 * * * *'

concurrency:
  group: karatov-operations-sync
  cancel-in-progress: false

jobs:
  operations:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WB_API_KEY: ${{ secrets.WB_API_KEY }}
      OZON_CLIENT_ID: ${{ secrets.OZON_CLIENT_ID }}
      OZON_API_KEY: ${{ secrets.OZON_API_KEY }}
      OZON_SYNC_ENABLED: "true"
      GITHUB_SYNC_KIND: operations
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run operations sync
        working-directory: backend
        run: python -m app.github_sync_runner
