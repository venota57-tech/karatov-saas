name: KARATOV Customer Ops Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "7-57/10 * * * *"

permissions:
  contents: read

concurrency:
  group: karatov-customer-ops-sync
  cancel-in-progress: false

jobs:
  customer-ops:
    name: Customer Ops sync
    runs-on: ubuntu-latest
    timeout-minutes: 14
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WB_API_KEY: ${{ secrets.WB_API_KEY }}
      WB_API_TOKEN: ${{ secrets.WB_API_TOKEN }}
      OZON_CLIENT_ID: ${{ secrets.OZON_CLIENT_ID }}
      OZON_API_KEY: ${{ secrets.OZON_API_KEY }}
      GITHUB_SYNC_KIND: customer_ops
      GITHUB_CUSTOMER_OPS_MODE: full
      CUSTOMER_OPS_MAX_CHATS: "60"
      CUSTOMER_OPS_MAX_MESSAGES_PER_CHAT: "100"
      CUSTOMER_OPS_MAX_RETURNS: "150"
      CUSTOMER_OPS_REQUEST_TIMEOUT: "20"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run customer ops sync
        working-directory: backend
        run: python -m app.github_sync_runner
