name: KARATOV Customer Ops Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "7-57/10 * * * *"

permissions:
  contents: read

concurrency:
  group: karatov-customer-ops-sync
  cancel-in-progress: false

jobs:
  customer-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WB_API_KEY: ${{ secrets.WB_API_KEY }}
      WB_API_TOKEN: ${{ secrets.WB_API_TOKEN }}
      OZON_CLIENT_ID: ${{ secrets.OZON_CLIENT_ID }}
      OZON_API_KEY: ${{ secrets.OZON_API_KEY }}
      GITHUB_SYNC_KIND: customer_ops
      STABLE_OS_MAX_ROWS: "120"
      STABLE_OS_MAX_PAGES: "3"
      STABLE_OS_REQUEST_TIMEOUT: "22"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run Stable Customer Ops Sync
        working-directory: backend
        run: python -m app.stable_sync_entry
