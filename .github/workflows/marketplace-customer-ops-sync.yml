name: KARATOV Customer Ops Sync
on:
  workflow_dispatch:
  schedule:
    - cron: "7-57/10 * * * *"
permissions: { contents: read }
concurrency: { group: karatov-customer-ops-sync, cancel-in-progress: false }
jobs:
  customer-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WB_API_KEY: ${{ secrets.WB_API_KEY }}
      WB_API_TOKEN: ${{ secrets.WB_API_TOKEN }}
      OZON_CLIENT_ID: ${{ secrets.OZON_CLIENT_ID }}
      OZON_API_KEY: ${{ secrets.OZON_API_KEY }}
      RECOVERY_V5_KIND: customer_ops
      RECOVERY_V5_PLATFORM: ALL
      RECOVERY_CHAT_LIMIT: "250"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - working-directory: backend
        run: pip install -r requirements.txt
      - working-directory: backend
        run: python -m app.recovery_v5_entry
