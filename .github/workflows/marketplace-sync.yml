name: KARATOV Marketplace Sync Tick

on:
  workflow_dispatch:
    inputs:
      kind:
        description: "Manual sync kind: all, ozon, wb, hot, hot_wb, hot_ozon, backfill, operations, answers, analytics, nightly"
        required: false
        default: "all"

concurrency:
  group: karatov-marketplace-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Manual marketplace sync
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WB_API_KEY: ${{ secrets.WB_API_KEY }}
      WB_API_TOKEN: ${{ secrets.WB_API_TOKEN }}
      OZON_CLIENT_ID: ${{ secrets.OZON_CLIENT_ID }}
      OZON_API_KEY: ${{ secrets.OZON_API_KEY }}
      OZON_SYNC_ENABLED: "true"
      OZON_AUTO_SYNC_ENABLED: "false"
      WB_SYNC_MODE: "both"
      WB_AUTO_SYNC_ENABLED: "false"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GITHUB_SYNC_KIND: ${{ github.event.inputs.kind || 'all' }}
      GITHUB_SYNC_MAX_OZON_PAGES: "20"
      GITHUB_SYNC_MAX_WB_CYCLES: "2"
      GITHUB_SYNC_OZON_TAKE: "25"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Run manual marketplace sync
        run: python -m app.github_sync_runner
