name: KARATOV Operations Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "22 * * * *"

permissions:
  contents: read

concurrency:
  group: karatov-operations-sync
  cancel-in-progress: false

jobs:
  operations:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WB_API_KEY: ${{ secrets.WB_API_KEY }}
      WB_API_TOKEN: ${{ secrets.WB_API_TOKEN }}
      OZON_CLIENT_ID: ${{ secrets.OZON_CLIENT_ID }}
      OZON_API_KEY: ${{ secrets.OZON_API_KEY }}
      RECOVERY_V5_STAGE: operations
      RECOVERY_V5_PLATFORM: ALL
      RECOVERY_STAGE_TIMEOUT_SECONDS: "960"
      RECOVERY_REQUEST_TIMEOUT: "24"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run staged Operations
        working-directory: backend
        run: python -m app.recovery_v5_stage_entry
