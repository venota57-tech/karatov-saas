name: KARATOV Hot Sync Ozon

on:
  workflow_dispatch:
  schedule:
    - cron: "6-56/10 * * * *"

permissions:
  contents: read

concurrency:
  group: karatov-hot-sync-ozon
  cancel-in-progress: false

jobs:
  ozon-hot:
    runs-on: ubuntu-latest
    timeout-minutes: 14
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      WB_API_KEY: ${{ secrets.WB_API_KEY }}
      WB_API_TOKEN: ${{ secrets.WB_API_TOKEN }}
      OZON_CLIENT_ID: ${{ secrets.OZON_CLIENT_ID }}
      OZON_API_KEY: ${{ secrets.OZON_API_KEY }}
      RECOVERY_V5_STAGE: ozon_reviews
      RECOVERY_V5_PLATFORM: OZON
      RECOVERY_V5_DEEP: "false"
      RECOVERY_HOT_PAGES: "2"
      RECOVERY_TAKE: "150"
      RECOVERY_OZON_REVIEW_INFO_LIMIT: "50"
      RECOVERY_STAGE_TIMEOUT_SECONDS: "780"
      RECOVERY_REQUEST_TIMEOUT: "24"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run Ozon staged hot sync
        working-directory: backend
        run: python -m app.recovery_v5_stage_entry
