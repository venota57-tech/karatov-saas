<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Karatov Dashboard</title>
</head>
<body>
  <h1>Отзывы</h1>
  <button onclick="loadReviews()">Обновить</button>
  <ul id="reviews"></ul>

<script>
async function loadReviews() {
  const res = await fetch("/reviews");
  const data = await res.json();

  const list = document.getElementById("reviews");
  list.innerHTML = "";

  data.forEach(r => {
    const li = document.createElement("li");
    li.innerHTML = `
      <b>${r.marketplace}</b>: ${r.text}
      <br/>
      Ответ: ${r.answer || "нет"}
      <br/>
      <button onclick="generate(${r.id})">Сгенерировать</button>
      <hr/>
    `;
    list.appendChild(li);
  });
}

async function generate(id) {
  await fetch(`/generate/${id}`, { method: "POST" });
  loadReviews();
}
</script>

</body>
</html>
