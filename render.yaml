services:
  - type: web
    name: karatov-saas
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend

  - type: worker
    name: karatov-saas-worker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m app.worker
    rootDir: backend

