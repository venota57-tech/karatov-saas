services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: karatov_cx_hub
      POSTGRES_USER: karatov
      POSTGRES_PASSWORD: karatov
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karatov -d karatov_cx_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://karatov:karatov@db:5432/karatov_cx_hub
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    command: ["npm", "run", "dev"]

volumes:
  postgres_data: